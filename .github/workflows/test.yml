name: test

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:15.12
        env:
          POSTGRES_USER: punoted
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: punoted
        ports:
          - 5445:5432
        options: >-
          --health-cmd "pg_isready -U punoted -d punoted"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - run: uv pip install --system --requirement requirements.txt

      - run: pytest --strict

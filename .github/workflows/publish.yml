name: push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo # image repo name must be lowercase; https://github.com/orgs/community/discussions/25768
        run: echo "name=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}

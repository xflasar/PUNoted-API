version: "3.8"

services:
  # ==============================================================================
  # 1. CORE INFRASTRUCTURE (Main App)
  # ==============================================================================

  # --- MAIN DATABASE ---
  prod_db:
    image: postgres:15.12-alpine
    container_name: punoted_prod_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5445:5432"
    volumes:
      - prod_data:/var/lib/postgresql/data
    networks:
      - punoted_prod_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- SHARED REDIS ---
  redis_cache:
    image: redis:alpine
    container_name: punoted_redis_prod
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - punoted_prod_net

  # --- API BACKEND ---
  backend:
    image: ghcr.io/xflasar/punoted-api:main
    container_name: punoted_backend_prod
    depends_on:
      redis_cache:
        condition: service_started
      prod_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis_cache:6379/0
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@prod_db:5432/${DB_NAME}
      - XATA_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@prod_db:5432/${DB_NAME}
    ports:
      - "127.0.0.1:9901:9901"
    networks:
      - punoted_prod_net
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9901 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================================================
  # 2. MONITORING STACK
  # ==============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: punoted_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - punoted_prod_net

  grafana:
    image: grafana/grafana:latest
    container_name: punoted_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - punoted_prod_net
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: punoted_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      # Remove below line if on Windows
      - /dev/disk/:/dev/disk:ro
    networks:
      - punoted_prod_net

  # ==============================================================================
  # 3. GLITCHTIP (Error Tracking)
  # ==============================================================================

  # --- GLITCHTIP DEDICATED DATABASE ---
  glitchtip_db:
    image: postgres:15.12-alpine
    container_name: punoted_glitchtip_db
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_data:/var/lib/postgresql/data
    networks:
      - punoted_prod_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U glitchtip -d glitchtip" ]
      interval: 5s
      timeout: 5s
      retries: 5

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: punoted_glitchtip_web
    depends_on:
      redis_cache:
        condition: service_started
      glitchtip_db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Connects to the dedicated 'glitchtip_db' container
      - DATABASE_URL=postgres://glitchtip:${DB_PASS}@glitchtip_db:5432/glitchtip
      - REDIS_URL=redis://redis_cache:6379/1 # Uses DB 1 on shared Redis
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - PORT=8000
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN}
      - ENABLE_USER_REGISTRATION=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,glitchtip-web,punoted_glitchtip_web
    networks:
      - punoted_prod_net

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    container_name: punoted_glitchtip_worker
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      redis_cache:
        condition: service_started
      glitchtip_db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://glitchtip:${DB_PASS}@glitchtip_db:5432/glitchtip
      - REDIS_URL=redis://redis_cache:6379/1
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
    networks:
      - punoted_prod_net

  db_maintenance:
    build: ./maintenance
    container_name: db_maintenance_worker
    environment:
      PGHOST: prod_db
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASS}
      PGDATABASE: ${DB_NAME}
    volumes:
      # Persist backups to the host machine
      - ./backups:/backups
      - ./config/rclone.conf:/config/rclone.conf:ro
    depends_on:
      prod_db:
        condition: service_healthy
    networks:
      - punoted_prod_net

# ==============================================================================
# NETWORKS & VOLUMES
# ==============================================================================
networks:
  punoted_prod_net:
    driver: bridge

volumes:
  prod_data: # Main App Data
  glitchtip_data: # GlitchTip Data (Isolated)
  redis_data: # Shared Cache
  grafana_data: # Monitoring Configs
  prometheus_data: # Metrics History
